apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hauling-companion-api
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - hauling-companion.jannekeipert.de
      secretName: multi-domain-cert
  rules:
    - host: hauling-companion.jannekeipert.de
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hauling-companion-api
                port:
                  number: 80
