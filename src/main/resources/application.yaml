spring:
  application:
    name: hauling-companion-api
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

tesseract:
  data-path: C:\Program Files\Tesseract-OCR\tessdata
  language: eng

gemini:
  api-key: ${GEMINI_API_KEY:}
  models:
    - gemini-2.5-flash
    - gemini-2.5-flash-lite
    - gemini-2.0-flash
    - gemini-2.0-flash-lite
    - gemini-1.5-flash
    - gemini-3.5-flash
    - gemini-3-flash-preview
    - gemini-3.1-flash-lite

hauler:
  scmdb-url: https://scmdb.net/data/merged-4.8.0-live.11875683.json

logging:
  level:
    root: INFO
